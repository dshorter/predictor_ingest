<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Ontology Reference</title>
  <link rel="stylesheet" href="css/tokens.css?v=3">
  <link rel="stylesheet" href="css/main.css?v=2">
  <link rel="stylesheet" href="css/ontology.css">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header id="onto-header">
  <h1 id="page-title">Ontology Reference <span id="domain-badge"></span></h1>
  <div class="header-actions">
    <button id="theme-toggle" class="btn-icon" title="Toggle dark/light mode"
            aria-label="Toggle dark/light mode">
      <svg class="icon-theme-light" xmlns="http://www.w3.org/2000/svg"
           width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1"  x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1"  y1="12" x2="3"  y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
        <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-theme-dark" xmlns="http://www.w3.org/2000/svg"
           width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    <a class="btn" href="index.html">Graph View</a>
  </div>
</header>

<!-- ── Body ────────────────────────────────────────────────────────────── -->
<main id="onto-body">
  <div id="onto-loading">Loading ontology…</div>
  <div id="onto-error" style="display:none"></div>
</main>

<script src="js/ontology.js"></script>
</body>
</html>
