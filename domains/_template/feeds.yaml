# RSS feeds for domain ingestion
# Runtime configuration - parsed by src/ingest/rss.py
#
# tier: 1 = primary/original source, 2 = secondary/aggregator, 3 = echo/mainstream
# signal: primary | commentary | echo | community

feeds: []
  # - name: "Example Feed"
  #   url: "https://example.com/feed.xml"
  #   type: rss          # or atom
  #   enabled: true
  #   limit: 15          # max items per run (0 = unlimited)
  #   tier: 1
  #   signal: primary
  #   # Optional keyword scoping (case-insensitive, matched on title+summary
  #   # BEFORE the article fetch). Use for broad feeds where only a slice is
  #   # domain-relevant. exclude wins over include.
  #   include_keywords: ["film", "studio", "production"]
  #   exclude_keywords: ["obituary"]
