# RSS feeds for Film & Independent Cinema trend graph
# Runtime configuration — parsed by src/ingest/rss.py
#
# Sources selected for nano-friendliness: trade press and craft blogs
# written in clear journalistic prose. No academic papers.
#
# tier: 1 = primary/original source, 2 = secondary/analysis, 3 = echo
# signal: primary | commentary | echo | community

feeds:
  # --- Tier 1: Major trades (breaking news, deal announcements) ---

  - name: "Deadline"
    url: "https://deadline.com/feed/"
    type: rss
    enabled: true
    limit: 15
    tier: 1
    signal: primary
    # Breaking deal news, casting, acquisitions. High volume.

  - name: "Variety Film"
    url: "https://variety.com/v/film/feed"
    type: rss
    enabled: false  # disabled 2026-07-19 (audit): PMC same-story overlap with
                    # Deadline — three PMC-adjacent wires is volume, not
                    # coverage. Re-enable keyword-scoped if festival/deal
                    # recall drops in epoch 2.
    limit: 15
    tier: 1
    signal: primary
    # Film industry news, box office, festival coverage.

  - name: "The Hollywood Reporter"
    url: "https://www.hollywoodreporter.com/feed"
    type: rss
    enabled: false  # disabled 2026-07-19 (audit): same PMC-overlap rationale
                    # as Variety. Deadline stays as the single PMC wire.
    limit: 15
    tier: 1
    signal: primary
    # Industry news, awards coverage, executive moves.

  - name: "IndieWire"
    url: "https://www.indiewire.com/feed"
    type: rss
    enabled: true
    limit: 15
    tier: 1
    signal: primary
    # Independent film focus. Reviews, festival coverage, craft.

  # --- Tier 1: Indie/craft (original content, practitioner voice) ---

  - name: "No Film School"
    url: "https://nofilmschool.com/feed"
    type: rss
    enabled: true
    tier: 1
    signal: community
    # Filmmaking craft, gear, tutorials, career advice.
    # Practitioner perspective — early signal on production tech trends.

  - name: "Filmmaker Magazine"
    url: "https://filmmakermagazine.com/feed"
    type: rss
    enabled: true
    tier: 1
    signal: commentary
    # Working filmmaker perspective, indie focus, festival dispatches.

  # --- Tier 1: Festival / institutional ---

  - name: "Sundance Institute"
    url: "https://www.sundance.org/feed/"
    type: rss
    enabled: true  # re-enabled 2026-07-19: bare-domain URL 403s, www works
                   # (verified fresh from pipeline UA; stalled since 03-17)
    tier: 1
    signal: primary
    # Festival selections, lab announcements, grants, artist resources.

  - name: "Film Independent"
    url: "https://filmindependent.org/feed"
    type: rss
    enabled: true
    tier: 1
    signal: primary
    # Spirit Awards, Project Involve, fiscal sponsorship, LA Film Fest.

  # --- Tier 2: Screenwriting / craft ---

  - name: "John August"
    url: "https://johnaugust.com/feed"
    type: rss
    enabled: true
    tier: 2
    signal: community
    # Veteran screenwriter blog. Industry commentary, craft advice.
    # Companion to Scriptnotes podcast.

  - name: "Go Into The Story"
    url: "https://gointothestory.blcklst.com/feed"
    type: rss
    enabled: true  # re-enabled 2026-03-18: returning 200 (was 403 on 2026-03-17)
    tier: 2
    signal: community
    # Black List affiliated. Script analysis, writing craft, Hollywood.

  - name: "Script Magazine"
    url: "https://scriptmag.com/feed"
    type: rss
    enabled: true
    tier: 2
    signal: commentary
    # Screenwriting craft, industry insights, interviews with writers.

  # --- Tier 2: Echo / mainstream (creates entity overlap for velocity) ---

  - name: "Save the Cat"
    url: "https://savethecat.com/feed"
    type: rss
    enabled: true
    tier: 2
    signal: community
    # Story structure, beat sheets, writing methodology.

  - name: "ScreenAnarchy"
    url: "https://screenanarchy.com/atom.xml"
    type: atom
    enabled: false  # disabled 2026-03-18: 404 Not Found
    tier: 2
    signal: echo
    # International / indie cinema reviews, festival coverage.

  # --- Tier 1: Southeast regional (added Sprint 7, 2026-03-18) ---
  # These feeds focus on the Southeast US production corridor.
  # See ADR-005 for regional focus rationale.

  - name: "Project Casting"
    url: "https://projectcasting.com/feed"
    type: rss
    enabled: true
    limit: 15
    tier: 1
    signal: primary
    # Casting calls + production news. Strong GA/Atlanta section.
    # Highest-volume regional source (~3-5 articles/day all regions).

  - name: "ArtsATL"
    url: "https://artsatl.org/feed"
    type: rss
    enabled: true
    tier: 1
    signal: commentary
    # Atlanta arts including film/TV, theater, culture. ~10-15/month.

  - name: "Atlanta Film and TV"
    url: "https://atlantafilmandtv.com/blog-feed"
    type: rss
    enabled: false  # disabled 2026-03-18: 404 Not Found — check for correct RSS path
    tier: 1
    signal: primary
    # Dedicated Atlanta film industry news, interviews. ~4-8/month.

  - name: "Georgia Entertainment"
    url: "https://georgiaentertainment.com/feed"
    type: rss
    enabled: true  # re-enabled 2026-03-18: verified 200 OK
    tier: 1
    signal: primary
    # Dedicated GA film/TV news; "Now Filming" monthly lists. ~8-12/month.

  # --- Tier 2: Southeast regional ---

  - name: "SC Film Commission"
    url: "https://filmsc.com/news/rss/default.aspx"
    type: rss
    enabled: false  # disabled 2026-07-19 (audit): enabled since 03-18, zero
                    # docs ever delivered (silent-zero feed; the text/html
                    # Content-Type note below was prophetic)
    tier: 2
    signal: primary
    # Official SC production news, grants, festivals. ~2-4/month.
    # NOTE: returns Content-Type: text/html (server misconfigured). Verify feedparser handles it.

  - name: "Charleston City Paper"
    url: "https://charlestoncitypaper.com/feed"
    type: rss
    enabled: true
    tier: 2
    signal: community
    # Alt-weekly; culture, arts, entertainment. ~2-4/month entertainment.
    # 2026-07-19 (audit): 245 docs but q 0.59 — worst in domain. Citywide
    # volume without film relevance; hard-scoped to the film slice.
    include_keywords: ["film", "movie", "festival", "cinema", "screening"]

  - name: "Nashville Scene"
    url: "https://nashvillescene.com/search/?f=rss&t=article&l=25&s=start_time&sd=desc"
    type: rss
    enabled: false  # disabled 2026-03-18: HTTP 429 rate limiting — revisit with simpler RSS URL
    tier: 2
    signal: community
    # Alt-weekly; arts, entertainment, music, some film. ~2-4/month.

  # --- Substack: Practitioner voices (added Sprint 7, 2026-03-18) ---
  # See ADR-006 for chatter source rationale. Zero code changes — native RSS.

  - name: "Hope For Film (Ted Hope)"
    url: "https://tedhope.substack.com/feed"
    type: rss
    enabled: true
    tier: 1
    signal: commentary
    # Major indie producer. Distribution, industry insights, career advice.

  - name: "Jon Reiss"
    url: "https://jonreiss.substack.com/feed"
    type: rss
    enabled: true
    tier: 2
    signal: commentary
    # Independent film distribution strategy, marketing for filmmakers.

  - name: "On the Fest Circuit"
    url: "https://onthefestcircuit.substack.com/feed"
    type: rss
    enabled: true
    tier: 2
    signal: community
    # Film festival circuit trends, strategy, filmmaker perspective.

  # --- Bluesky: Keyword search (added Sprint 7) ---
  # See ADR-006 for chatter source rationale.
  # Requires BSKY_HANDLE + BSKY_APP_PASSWORD env vars in .env.

  - name: "Bluesky SE Film"
    type: bluesky
    enabled: true
    tier: 2
    signal: community
    limit: 25
    keywords:
      - "indie film Georgia"
      - "Atlanta film production"
      - "Trilith Studios"
      - "Southeast film"
      - "Georgia film tax credit"
    # Regional film chatter. Keywords target SE production corridor.

  # --- Reddit: REMOVED 2026-07-19 (audit + operator decision) ---
  # r/Atlanta, r/Filmmakers, r/indiefilm sat here from 2026-03-18 without
  # ever delivering a doc (credentials never provisioned). Dropped so the
  # list stops overstating chatter coverage; Bluesky is the chatter leg.
  # Re-add via source_changelog.yaml if credentials ever materialize.

  # --- Audit batch 2026-07-19: adopted blind-inference additions ---
  # Three-way source audit (docs/audits/source-audit-2026-07-19.md),
  # operator-approved as written. All feeds verified fresh from the
  # pipeline UA on 2026-07-19. Logged in config/source_changelog.yaml.

  - name: "SaportaReport"
    url: "https://saportareport.com/feed/"
    type: rss
    enabled: true
    limit: 15
    tier: 2
    signal: commentary
    # Atlanta civic/business journalism. The real-estate/civic-money side
    # of the studio build-out (Invest Atlanta bonds, rezonings) that
    # entertainment trades never cover. ~10-20% film-relevant — scoped.
    include_keywords: ["film", "studio", "soundstage", "production", "festival"]

  - name: "GPB News"
    url: "https://www.gpb.org/rss.xml"
    type: rss
    enabled: true
    limit: 15
    tier: 2
    signal: commentary
    # Georgia Public Broadcasting, site-wide feed (no film-topic feed
    # exists) — scoped to the film slice. Covers the *politics* of the GA
    # incentive with original reporting; deliberate bias-check on Georgia
    # Entertainment's boosterism.
    include_keywords: ["film", "movie", "studio", "production", "tax credit",
                       "incentive", "entertainment industry"]

  - name: "MovieMaker"
    url: "https://www.moviemaker.com/feed/"
    type: rss
    enabled: true
    limit: 10
    tier: 1
    signal: commentary
    # Regional/sub-A24 festival tier and working-class filmmaking the
    # prestige trades ignore. "50 Festivals Worth the Entry Fee."

  - name: "Hammer to Nail"
    url: "https://www.hammertonail.com/feed/"
    type: rss
    enabled: true
    tier: 1
    signal: commentary
    # Micro-budget/truly-indie reviews + regional festival reports. The
    # no-distribution tier where genre/aesthetic trends incubate. ~3-4/wk.

  - name: "The Film Stage"
    url: "https://thefilmstage.com/feed/"
    type: rss
    enabled: true
    limit: 10
    tier: 1
    signal: primary
    # Festival lineups + specialty distribution (Criterion, arthouse
    # releases). PMC-independent. ~4-6/day.

  - name: "Stephen Follows"
    url: "https://stephenfollows.com/feed/"
    type: rss
    enabled: true
    tier: 1
    signal: commentary
    # Quantitative film-industry analysis — original data, never
    # syndicated. Novelty-signal gold. ~2-3/wk.

  - name: "CineD"
    url: "https://www.cined.com/feed/"
    type: rss
    enabled: true
    limit: 10
    tier: 1
    signal: commentary
    # Camera/production-tech hands-on depth; EU-based counterweight to US
    # gear blogs. ~3-4/day.
