# --- Relation metadata enums ---
relation_kinds:
  - asserted
  - inferred
  - hypothesis

polarity_values:
  - pos
  - neg
  - unclear

modality_values:
  - observed
  - planned
  - speculative

# --- ID Prefixes ---
id_prefixes:
  Person: person
  Studio: studio
  Production: prod
  Festival: fest
  Distributor: dist
  Agency: agency
  Fund: fund
  Network: net
  Genre: genre
  Tech: tech
  Award: award
  Org: org
  Topic: topic
  Event: event
  Location: location
  Other: other

# --- Base Relation ---
base_relation: MENTIONS

# --- Quality Thresholds ---
# Trade press is entity-dense (lots of names per article) but
# relations are often implicit. Tuned accordingly.
quality_thresholds:
  entity_density_target: 6.0       # trade press name-drops heavily
  evidence_coverage_min: 0.8
  avg_confidence_target: 0.85
  relation_entity_ratio_target: 0.4  # slightly lower — many MENTIONS, fewer semantic
  tech_terms_min: 1                  # not every article mentions tech
  relation_type_diversity_target: 5

# --- Gate Thresholds ---
gate_thresholds:
  evidence_fidelity_min: 0.0     # Gate A disabled — film trade press paraphrases heavily; nano fails ~80% on fidelity check.
                                  # Tradeoff: edge detail panels will show evidence objects but snippets are NOT verified
                                  # to appear in source text. Gates B/C/D (orphans, zero-value, high-conf) remain enforced.
                                  # (was 0.60, previously lowered from 0.70)
  orphan_max: 0.0
  zero_value_min_entities: 1
  zero_value_min_doc_chars: 500
  high_confidence_threshold: 0.0  # Gate D disabled — film trade press paraphrases heavily; fidelity check can't distinguish paraphrase from fabrication. Gates B/C (orphans, zero-value) remain enforced. (2026-03-24)

escalation_threshold: 0.55     # lowered from 0.6 — trade press style yields lower density scores than technical content

# --- Scoring Weights ---
# Emphasize connectivity (who works with whom) and density (name-heavy articles).
# Lower weight on tech_terms since not every film article has technical content.
scoring_weights:
  density: 0.20
  evidence: 0.15
  confidence: 0.10
  connectivity: 0.25
  diversity: 0.20
  tech_terms: 0.10

# --- Trend Weights ---
trend_weights:
  velocity: 0.4
  novelty: 0.3
  activity: 0.3
  velocity_cap: 5.0
  activity_cap: 20
  max_age_days: 365
  novelty_age_weight: 0.6
  novelty_rarity_weight: 0.4

# --- Suppressed Entities ---
# Too generic for a film knowledge graph.
suppressed_entities:
  - film
  - movie
  - show
  - series
  - project
  - production
  - studio
  - actor
  - actress
  - director
  - writer
  - producer
  - story
  - script
  - screenplay
  - industry
  - entertainment
  - Hollywood
  - cinema
  - audience
  - viewer
  - character
  - role
  - cast
  - crew
  - set
  - content
  - platform
  - streaming
  - media
  - company

# --- Region Lookup ---
# Maps Location entity names to region slugs for export-time tagging.
# See ADR-005: regional focus is a client-side lens, not a scoring signal.
# 2-hop propagation at export time tags connected nodes with region[].
regions:
  southeast:
    # Georgia — primary hub
    - Atlanta
    - Savannah
    - Georgia
    - Trilith Studios
    # Louisiana
    - New Orleans
    - Baton Rouge
    - Louisiana
    # North Carolina
    - Wilmington
    - Charlotte
    - North Carolina
    # Tennessee
    - Nashville
    - Memphis
    - Tennessee
    # South Carolina
    - Charleston
    - South Carolina

# --- LLM Leverage Features ---
# Framework features configured per-domain. See docs/guides/new-domain-features.md.
features:
  llm_disambiguation:
    enabled: true
    similarity_lower_bound: 0.40
    similarity_upper_bound: 0.85
    max_pairs_per_run: 50
    batch_size: 15
    entity_types_to_disambiguate: [Person, Studio, Production]

  relation_inference:
    enabled: true
    confidence_discount: 0.8
    max_inferences_per_run: 500
    rules_file: "inference_rules.yaml"

  cross_document_synthesis:
    enabled: true
    batch_size: 5
    min_shared_entities: 1
    max_batches_per_run: 10
    synthesis_patterns:
      - "corroboration"
      - "implicit_relations"
      - "event_clustering"

  trend_narratives:
    enabled: true
    top_n: 10
    max_tokens_per_narrative: 250
    style: "concise"

# --- Prompts ---
prompts:
  dir: prompts
  system_prompt: system.txt
  user_prompt: user.txt
  single_message_prompt: single_message.txt
