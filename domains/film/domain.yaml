# Domain Profile: Film & Independent Cinema
# Schema: schemas/domain-profile.json
#
# Tracks the independent film landscape: projects moving through
# development → production → festival → distribution, the people
# and companies driving them, and emerging trends in indie cinema.
#
# Sources are trade press (Deadline, Variety, IndieWire) and craft
# blogs (No Film School, John August) — news-format content that
# performs well with cost-conscious extraction models.

domain:
  name: "Film & Independent Cinema"
  slug: "film"
  description: "Independent film production, screenwriting, festivals, and distribution trends"

# --- Entity Types ---
# Discovered from reading trade press: what nouns recur?
# Productions are the central node; people, companies, and festivals
# are the connective tissue.
entity_types:
  - Person          # Directors, writers, producers, actors, agents
  - Studio          # A24, Blumhouse, Neon, Searchlight, etc.
  - Production      # Specific film/show projects (in dev or released)
  - Festival        # Sundance, TIFF, Cannes, SXSW, Tribeca, etc.
  - Distributor     # Netflix, Amazon, Apple, theatrical chains
  - Agency          # CAA, WME, UTA, Verve, ICM
  - Fund            # Sundance Labs, Film Independent, state incentives
  - Network         # HBO, FX, A&E — TV/streaming networks
  - Genre           # Horror, drama, documentary, sci-fi, etc.
  - Tech            # LED volume, Unreal Engine, AI tools, cameras
  - Award           # Oscar, Spirit Award, Palme d'Or, etc.
  - Org             # Guilds (WGA, DGA, SAG), MPAA, academies
  - Topic           # Themes: representation, AI in film, labor, etc.
  - Event           # Markets, panels, strikes, industry events
  - Location        # Shooting locations, production hubs
  - Other           # Catch-all

# --- Relation Taxonomy ---
relation_taxonomy:
  canonical:
    # Document-level (base layer)
    - MENTIONS
    - CITES
    - ANNOUNCES
    - REPORTED_BY

    # Creative roles
    - DIRECTS           # Person → Production
    - WRITES            # Person → Production (screenplay)
    - PRODUCES          # Person/Studio → Production
    - STARS_IN          # Person → Production
    - SCORES            # Person → Production (composer)
    - EDITS             # Person → Production

    # Deal flow / business
    - ACQUIRES          # Distributor/Studio → Production
    - DISTRIBUTES       # Distributor → Production
    - FINANCES          # Fund/Studio/Person → Production
    - GREENLIGHTS       # Studio/Network → Production
    - OPTIONED          # Studio/Person → Production (rights option)
    - COMMISSIONS       # Network/Studio → Production

    # Festival circuit
    - PREMIERES_AT      # Production → Festival
    - SELECTED_BY       # Production → Festival
    - WINS              # Production/Person → Award
    - NOMINATED_FOR     # Production/Person → Award

    # Industry relationships
    - REPRESENTS        # Agency → Person
    - SIGNS_WITH        # Person → Agency/Studio
    - PARTNERS_WITH     # Studio ↔ Studio, Studio ↔ Distributor
    - HIRES             # Studio/Production → Person
    - FOUNDED           # Person → Studio/Fund

    # Production pipeline
    - DEVELOPS          # Studio/Person → Production
    - ADAPTS            # Production → Production/Other (source material)
    - BASED_ON          # Production → Other (book, article, IP)
    - SHOOTS_IN         # Production → Location
    - USES_TECH         # Production/Studio → Tech

    # Industry / meta
    - GOVERNS           # Org (guild) → Topic/Industry practice
    - REGULATES         # Org → Topic
    - CREATED           # Person/Studio → Production/Fund/Org
    - OPERATES          # Studio → Fund/Program

  groups:
    document:
      - MENTIONS
      - CITES
      - ANNOUNCES
      - REPORTED_BY
    creative:
      - DIRECTS
      - WRITES
      - PRODUCES
      - STARS_IN
      - SCORES
      - EDITS
    business:
      - ACQUIRES
      - DISTRIBUTES
      - FINANCES
      - GREENLIGHTS
      - OPTIONED
      - COMMISSIONS
    festival:
      - PREMIERES_AT
      - SELECTED_BY
      - WINS
      - NOMINATED_FOR
    industry:
      - REPRESENTS
      - SIGNS_WITH
      - PARTNERS_WITH
      - HIRES
      - FOUNDED
    production:
      - DEVELOPS
      - ADAPTS
      - BASED_ON
      - SHOOTS_IN
      - USES_TECH
    governance:
      - GOVERNS
      - REGULATES
      - CREATED
      - OPERATES

  # Map LLM output variations to canonical relation types.
  # Semantic synonyms first (require domain judgment), then
  # tense variants are auto-generated via generate_normalization.py.
  normalization:
    # Creative role synonyms
    DIRECTED: DIRECTS
    DIRECTED_BY: DIRECTS
    WRITTEN: WRITES
    WRITTEN_BY: WRITES
    WROTE: WRITES
    SCREENWRITER: WRITES
