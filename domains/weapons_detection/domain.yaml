# --- Relation metadata enums ---
relation_kinds:
  - asserted
  - inferred
  - hypothesis

polarity_values:
  - pos
  - neg
  - unclear

modality_values:
  - observed
  - planned
  - speculative

# --- ID Prefixes ---
id_prefixes:
  Vendor: vendor
  Product: product
  Buyer: buyer
  Person: person
  Regulation: regulation
  Report: report
  Event: event
  Location: location
  Topic: topic
  Org: org
  Document: doc
  Other: other

# --- Base Relation ---
base_relation: MENTIONS

# --- Gate Thresholds ---
# Trade press + regulatory filings are clear prose like film/semis — no
# reason to deviate from the standard thresholds pre-calibration.
gate_thresholds:
  evidence_fidelity_min: 0.70
  orphan_max: 0.0
  zero_value_min_entities: 1
  zero_value_min_doc_chars: 500
  high_confidence_threshold: 0.8

# --- Doc Selection Budget (ADR-010 D3 pattern) ---
# Registry's steady-state estimate: 5-12 docs/day (pond-sized, smaller
# than fusion's 10-15 — this is the tripwire/detection-disposition
# domain, not a ranking-volume domain).
#
# TEMPORARY 2x (2026-07-20 -> 2026-08-15): Anthropic rate reduction
# through mid-August. Normal values: budget 10 / stretch_max 15. Kept
# active from day one (unlike film/semiconductors, which delayed their
# bump to 2026-08-02) — this domain's first-ever run was already at 2x,
# so there's no prior-budget baseline to create a mid-window
# discontinuity against. Zero artifact risk. See
# docs/backend/operational-state.md; a VTODO on the ops calendar is the
# revert reminder.
doc_selection:
  budget: 20
  stretch_max: 30

# --- Trend Weights ---
# Mixed cadence: procurement/regulatory cycles are slow (semis-like,
# hence the longer max_age_days and slow decay) but incident-driven
# volume spikes happen (the registry's known weakness: velocity will
# partly track news cycles of tragedies, so 20.8's `sustained` flag
# matters more than raw velocity here). min_mentions_for_velocity is
# lowered from the framework default (3 -> 2) so genuine risers aren't
# gated away in a domain this sparse.
trend_weights:
  velocity: 0.4
  novelty: 0.3
  activity: 0.3
  velocity_cap: 5.0
  activity_cap: 10
  max_age_days: 540
  novelty_age_weight: 0.6
  novelty_rarity_weight: 0.4
  novelty_decay_lambda: 0.03  # ~23-day half-life
  min_mentions_for_velocity: 2

# --- Suppressed Entities ---
# Too generic for this graph — every vendor's marketing copy uses these.
suppressed_entities:
  - weapon
  - gun
  - firearm
  - detection
  - system
  - systems
  - technology
  - security
  - screening
  - device
  - platform
  - sensor
