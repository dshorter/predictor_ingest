# ==========================================================================
# Domain Profile: Weapons Detection Systems (Indoor)
# ==========================================================================
# Onboarded 2026-07-20, out of sequence relative to the pond-sizing queue
# (fusion → biopharma → this) recorded in
# docs/methodology/domain-candidates.md — operator directive to jump the
# queue. Scoring, disposition, and known weaknesses were pre-registered
# there on 2026-07-19 before this file existed; see
# docs/methodology/hypotheses/weapons-detection-indoor.md for the named
# prediction this domain is expected to prove or break (Sprint 20.15
# pattern, methodology §2 pre-registration discipline).
#
# Scope: one ecosystem selling into the same buyers (transit agencies,
# schools, hospitals, venues, workplaces) — acoustic gunshot detection
# (AmberBox, SoundThinking/ShotSpotter, Databuoy), visual AI detection
# (ZeroEyes, Omnilert), and walk-through weapons screening (Evolv, Xtract
# One, CEIA). Deliberately NOT scoped to a single venue type (subway
# stations were an illustrative example in the original request, not a
# lens — see the registry entry's rationale).
#
# Framework: predictor_ingest (domain-agnostic pipeline)
# Schema:    schemas/domain-profile.json
# ==========================================================================

domain:
  name: "Weapons Detection Systems (Indoor)"
  slug: "weapons_detection"
  description: >
    Indoor weapons detection as one commercial ecosystem: acoustic gunshot
    detection, visual AI detection, and walk-through screening vendors
    selling into transit, school, hospital, venue, and workplace buyers.
    Tracks vendor-buyer deployments, procurement cycles, regulatory
    mandates, and the accuracy/surveillance controversy that runs through
    every product category.

# --- Entity Types ---
entity_types:
  - Vendor          # AmberBox, SoundThinking, ZeroEyes, Evolv, Xtract One, CEIA, Omnilert
  - Product          # Named systems/platforms (Evolv Express, ZeroEyes Z6, ShotSpotter)
  - Buyer            # Transit agency, school district, hospital system, venue operator, employer
  - Person           # Executives, researchers, advocates, officials
  - Regulation       # Laws, mandates, procurement policies, RFPs, evaluation requirements
  - Report           # Evaluation reports, watchdog studies, accuracy audits, pilot findings
  - Event            # Contract awards, pilot launches, incidents, trade shows (ISC West, GSX)
  - Location         # Cities, transit systems, school districts, venues, states
  - Topic            # False-positive rate, algorithmic bias, privacy/surveillance, cost-per-scan
  - Org              # Watchdogs (ACLU, EFF, MacArthur Justice Center), trade groups (SIA), agencies
  - Document         # Pipeline-internal source documents
  - Other            # Catch-all

# --- Relation Taxonomy ---
relation_taxonomy:
  canonical:
    # Document-level (base layer)
    - MENTIONS
    - CITES
    - ANNOUNCES
    - REPORTED_BY

    # Commercial / deployment
    - MANUFACTURES     # Vendor -> Product
    - DEPLOYED_TO       # Product -> Buyer (installed/live)
    - PROCURES          # Buyer -> Product (purchase/RFP award)
    - PILOTS            # Buyer -> Product (trial program, not yet full deployment)
    - CONTRACTS_WITH     # Buyer <-> Vendor (direct commercial relationship)
    - ACQUIRES          # Vendor -> Vendor (company acquisitions, e.g. Alarm.com/SDS)
    - PARTNERS_WITH      # Vendor <-> Vendor, Vendor <-> Buyer (integrations, resale deals)

    # Regulatory / governance
    - MANDATES          # Regulation -> Buyer (law requires adoption)
    - REQUIRES           # Regulation -> Product (inferred: regulation drives a product category)
    - GOVERNED_BY        # Buyer -> Regulation
    - REGULATES          # Org -> Vendor/Product (oversight body)

    # Evaluation / controversy (the axis the registry calls out explicitly)
    - EVALUATES          # Report -> Product (study/audit)
    - DISPUTES           # Org -> Vendor/Product (watchdog challenges accuracy/marketing claims)
    - ASSOCIATED_WITH     # Product/Report -> Topic
    - INVESTIGATES        # Org -> Vendor/Product
    - RESPONDS_TO         # Vendor -> Report/Org (vendor rebuttal)

    # Personnel
    - FOUNDED            # Person -> Vendor/Org
    - HIRED              # Vendor/Org -> Person
    - LEADS              # Person -> Vendor/Org

    # Events
    - PRESENTS_AT         # Vendor -> Event
    - OCCURS_AT           # Event -> Location

  groups:
    document:
      - MENTIONS
      - CITES
      - ANNOUNCES
      - REPORTED_BY
    commercial:
      - MANUFACTURES
      - DEPLOYED_TO
      - PROCURES
      - PILOTS
      - CONTRACTS_WITH
      - ACQUIRES
      - PARTNERS_WITH
    regulatory:
      - MANDATES
      - REQUIRES
      - GOVERNED_BY
      - REGULATES
    evaluation:
      - EVALUATES
      - DISPUTES
      - ASSOCIATED_WITH
      - INVESTIGATES
      - RESPONDS_TO
    personnel:
      - FOUNDED
      - HIRED
      - LEADS
    event:
      - PRESENTS_AT
      - OCCURS_AT

  # Semantic synonyms (domain judgment). Tense variants are auto-generated
