  - agency
  - school
  - hospital
  - venue
  - transit
  - station
  - campus
  - industry
  - solution
  - product

# --- LLM Leverage Features ---
features:
  llm_disambiguation:
    enabled: true
    similarity_lower_bound: 0.40
    similarity_upper_bound: 0.85
    max_pairs_per_run: 200
    batch_size: 15
    entity_types_to_disambiguate: [Vendor, Product, Buyer, Org, Person]
    # Vendor/product naming churns (ShotSpotter -> SoundThinking is the
    # canonical example this domain will hit on day one).

  relation_inference:
    enabled: true
    confidence_discount: 0.7
    max_inferences_per_run: 200
    rules_file: "inference_rules.yaml"

  cross_document_synthesis:
    enabled: true
    batch_size: 5
    min_shared_entities: 1
    max_batches_per_run: 5
    synthesis_patterns:
      - "corroboration"
      - "implicit_relations"
      # Controversy stories (accuracy disputes, watchdog reports) are
      # exactly the multi-outlet-coverage case synthesis exists for.

  trend_narratives:
    enabled: true
    top_n: 10
    max_tokens_per_narrative: 200
    style: "regulatory"
    # Sparse, dated, and often adversarial (vendor claim vs watchdog
    # finding) — closer to biosafety's register than film's trade-press
    # breeziness.

# --- Prompts ---
prompts:
  dir: prompts
  system_prompt: system.txt
  user_prompt: user.txt
  single_message_prompt: single_message.txt
