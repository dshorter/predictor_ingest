# ==========================================================================
# RSS Feeds: Biosafety & Select Agent Monitoring
# ==========================================================================
# Tier model (from source-selection-strategy.md):
#   primary   — original research, policy, regulatory announcements
#   secondary — expert analysis, commentary, synthesis
#   echo      — news aggregation, velocity signal
#
# Signal types:
#   regulatory  — rule changes, guidance, enforcement actions
#   research    — papers, preprints, lab findings
#   incident    — outbreaks, lab accidents, containment breaches
#   policy      — governance changes, international agreements
#   community   — expert commentary, practitioner perspectives
#
# Source viability history:
#   2026-03-08: 6 feeds removed (WHO, JHU CHS, NTI, PNAS, Science — no RSS).
#   2026-03-14: 4 feeds disabled (mBio 403, Federal Register unreachable,
#               Bulletin of Atomic Scientists 403, GAO empty). Replaced with
#               bioRxiv, medRxiv, BMC Infectious Diseases, Eurosurveillance,
#               Lancet Microbe, Frontiers Infectious Diseases, MMWR.
#   Future expansion should prioritize APIs over RSS:
#     - Federal Register API (regulations.gov)
#     - PubMed/PMC API (research papers)
#     - WHO API (disease outbreak news)
#     - ProMED (subscription-based since 2023)
#   See docs/architecture/multi-domain-futures.md for API source roadmap.
# ==========================================================================

feeds:
  # ── Primary: Research Journals & Preprints ────────────────────────────

  - name: "Emerging Infectious Diseases"
    url: "https://wwwnc.cdc.gov/eid/rss/upcoming.xml"
    tier: primary
    signal: research
    limit: 30
    notes: "CDC's peer-reviewed journal — upcoming/ahead-of-print articles"

  - name: "bioRxiv Microbiology"
    url: "https://connect.biorxiv.org/biorxiv_xml.php?subject=microbiology"
    tier: primary
    signal: research
    limit: 30
    notes: "Preprint server — microbiology section. High volume, early signal."

  - name: "medRxiv Infectious Diseases"
    url: "https://connect.medrxiv.org/medrxiv_xml.php?subject=Infectious+Diseases+(except+HIV/AIDS)"
    tier: primary
    signal: research
    limit: 30
    notes: "Health sciences preprints — infectious disease section."

  - name: "BMC Infectious Diseases"
    url: "https://bmcinfectdis.biomedcentral.com/articles/most-recent/rss.xml"
    tier: primary
    signal: research
    limit: 20
    notes: "Open-access peer-reviewed journal. Springer Nature platform — reliable RSS."

  - name: "Lancet Microbe"
    url: "https://www.thelancet.com/rssfeed/lanmic_current.xml"
    tier: primary
    signal: research
    limit: 15
    notes: "Gold open-access Lancet journal covering microbiology and infectious disease."

  - name: "Frontiers Infectious Diseases"
    url: "https://www.frontiersin.org/journals/microbiology/sections/infectious-agents-and-disease/rss"
    tier: primary
    signal: research
    limit: 20
    notes: "Frontiers in Microbiology — Infectious Agents and Disease section. Open access."

  # ── Secondary: Surveillance & Policy ──────────────────────────────────

  - name: "CIDRAP - Biosecurity Issues"
    url: "https://www.cidrap.umn.edu/news/50/rss"
    tier: secondary
    signal: community
    limit: 30
    notes: "CIDRAP biosecurity-specific topic feed (UMN)"

  - name: "Eurosurveillance"
    url: "https://www.eurosurveillance.org/action/showFeed?type=etoc&feed=rss&jc=eurosurveillance"
    tier: secondary
    signal: research
    limit: 20
    notes: "ECDC's journal on infectious disease surveillance, epidemiology, prevention. Weekly."

  - name: "CDC MMWR"
    url: "https://tools.cdc.gov/podcasts/feed.asp?feedid=183"
    tier: secondary
    signal: regulatory
    limit: 15
    notes: "Morbidity and Mortality Weekly Report — CDC's primary surveillance publication."

  # ── Echo: News & Velocity ─────────────────────────────────────────────

  - name: "STAT News - Infectious Disease"
    url: "https://www.statnews.com/topic/infectious-disease/feed/"
    tier: echo
    signal: community
    limit: 20
    notes: "Health/biotech news; covers biosafety incidents and policy"

  - name: "Science Daily - Infectious Diseases"
    url: "https://www.sciencedaily.com/rss/top/health/diseases_conditions/infectious_diseases.xml"
    tier: echo
    signal: community
    limit: 15
    notes: "Science news aggregator — infectious disease coverage. Echo/velocity signal."

# ==========================================================================
# Disabled feeds (2026-03-16) — confirmed broken after 3 run attempts
# ==========================================================================
# - Federal Register - Biosafety: unreachable on all runs. Candidate for
#   regulations.gov API integration.
# - mBio: journals.asm.org returns 403 on all article fetches. Silverchair
#   platform blocks automated access. Candidate for PubMed API.
# - Bulletin of the Atomic Scientists: thebulletin.org/feed/ returns 403.
#   May have added bot blocking.
# - GAO Reports - Science & Technology: feed parses but returns 0 entries
#   consistently. Low-volume source, not worth maintaining.
#
# Removed feeds (2026-03-08) — no working RSS available
# - WHO Disease Outbreak News, WHO Weekly Epi Record, JHU CHS, NTI,
#   PNAS Microbiology, Science - Biosecurity. See git history for URLs.
# ==========================================================================
