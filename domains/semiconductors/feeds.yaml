# RSS feeds for Semiconductors & Chips trend graph
# Runtime configuration — parsed by src/ingest/rss.py
#
# Stack design: anchor on deep-analysis newsletters (SemiAnalysis, The Chip Letter)
# for high-signal low-volume Tier 1 content; use trade press and community blogs
# for entity overlap and velocity. Total estimated volume: 15-25 docs/day —
# budget-conscious by design.
#
# NOTE: Feed URLs marked [VERIFY] were not confirmed accessible during config
# authoring. Verify on the VPS before enabling production runs.
#
# tier: 1 = primary/original source, 2 = secondary/analysis, 3 = echo
# signal: primary | commentary | echo | community

feeds:
  # --- Tier 1: Deep analysis (anchor sources — highest signal/doc ratio) ---

  - name: "SemiAnalysis"
    url: "https://semianalysis.substack.com/feed"
    type: rss
    enabled: true
    limit: 10
    tier: 1
    signal: commentary
    # Dylan Patel. Best-in-class analysis on process nodes, supply chain,
    # AI accelerators, and fab economics. Partially paywalled — free tier
    # gets ~50% of posts but those are the public-facing high-signal pieces.
    # [VERIFY] Substack RSS accessibility from VPS.

  - name: "The Chip Letter"
    url: "https://thechipletter.substack.com/feed"
    type: rss
    enabled: true
    limit: 5
    tier: 1
    signal: commentary
    # Stephen Witt. Weekly deep-dives on chip history, architecture, and
    # industry dynamics. Free, low volume (~1/week), very high entity density.
    # Excellent for persistent entity corroboration across issues.
    # [VERIFY] feed accessibility from VPS.

  - name: "Semiconductor Engineering"
    url: "https://semiengineering.com/feed/"
    type: rss
    enabled: true
    limit: 20
    tier: 1
    signal: primary
    # Broad practitioner coverage: EDA, process, packaging, power, security.
    # Community contributor model — multiple expert voices, free, active.
    # Highest volume Tier 1 source; good for catching toolchain and
    # materials trends that trade press misses.
    # [VERIFY] feed accessibility from VPS.

  # --- Tier 1: GPU & microarchitecture (closes the GPU coverage gap) ---

  - name: "Chips and Cheese"
    url: "https://chipsandcheese.com/feed/"
    type: rss
    enabled: true
    limit: 10
    tier: 1
    signal: commentary
    # Deep GPU and CPU microarchitecture teardowns. Free, ~1-2/week.
    # Catches architectural shifts (new cache hierarchies, memory subsystems,
    # compute unit design) well before mainstream trade press notices them.
    # Key source for GPU → AI workload connection in the graph.
    # [VERIFY] feed accessibility from VPS.

  # --- Tier 2: Trade press (entity overlap and velocity) ---

  - name: "EE Times"
    url: "https://www.eetimes.com/feed/"
    type: rss
    enabled: true
    limit: 15
    tier: 2
    signal: primary
    # Design and tooling coverage. EDA, FPGA, embedded, automotive chips.
    # Fills gaps that deep-analysis newsletters skip. Good on Cadence/Synopsys
    # news and design methodology trends.
    # [VERIFY] feed accessibility from VPS.

  - name: "The Register Hardware"
    url: "https://www.theregister.com/hardware/semiconductors/headlines.atom"
    type: atom
    enabled: true
    limit: 15
    tier: 2
    signal: echo
    # Good on supply chain, geopolitics, and export control news.
    # Different editorial angle from US trade press — catches UK/EU policy
    # angles and ASML/TSMC stories from a non-US perspective.
    # [VERIFY] feed URL — may need /headlines.atom or /feed path.

  - name: "SemiWiki"
    url: "https://semiwiki.com/feed/"
    type: rss
    enabled: true
    limit: 15
    tier: 2
    signal: community
    # Community blog — practitioners, analysts, and industry veterans.
    # Covers EDA tools, IP licensing, fab news, and conference reports.
    # Good overlap source: same fabs/chips covered by Tier 1 but from
    # practitioner angles that surface different relation types.
    # [VERIFY] feed accessibility from VPS.

  # --- Tier 2: GPU/compute from consumer angle (velocity echo) ---

  - name: "Tom's Hardware"
    url: "https://www.tomshardware.com/feeds/all"
    type: rss
    enabled: true
    limit: 3
    tier: 2
    signal: echo
    # Consumer-facing but high volume on GPU benchmarks, product launches.
    # Primary value: early product announcement velocity and benchmark
    # comparisons that name specific chip variants (H100 SXM5, RX 7900 XTX).
    #
    # LIMIT REDUCED 2026-04-18: 10 → 3. Across the first 10 days of operation
    # Tom's Hardware supplied 80/172 docs (40% of corpus) and 2,047/3,102
    # entities (66% of total). The review-specific entities (variant SKUs,
    # benchmark configs, test rigs) churn per-article and never appear in
    # a second doc, inflating the denominator of the overlap metric while
    # contributing nothing to persistence. See
    # docs/methodology/semiconductor-experiment-10day-findings.md.

  # --- Tier 2: Policy & geopolitics ---
  # Export controls and CHIPS Act are slow-moving but high-persistence
  # signals. Low volume, high entity permanence.

  - name: "Real World Tech"
    url: "https://www.realworldtech.com/feed/"
    type: rss
    enabled: false  # [VERIFY] site may be low-activity — confirm before enabling
    limit: 5
    tier: 2
    signal: commentary
    # David Kanter. Extremely deep technical analysis of CPU/GPU architecture.
    # Low volume but authoritative. Enable once feed accessibility confirmed.

  # --- Tier 1: Primary-source filings & earnings (HIGH-PERSISTENCE PLACEHOLDER) ---
  # Motivation: after 10 days the corpus plateaued at ~20% entity overlap
  # (target 30%). Diagnosis: the current stack is news-weighted — trade press
  # churns through product SKUs but rarely re-names the underlying corporate
  # and supply-chain entities. Earnings calls and 10-K filings re-assert the
  # SAME company / fab / customer relationships quarter after quarter, giving
  # the graph a persistence layer it currently lacks. None of these are
  # plain RSS — each needs a connector. See:
  #   - docs/methodology/semiconductor-experiment-10day-findings.md
  #   - docs/methodology/deep-research-report.md (EDGAR notes)
  #
  # Status: DISABLED placeholders. Keep in the file so the ingestion-strategy
  # discussion is visible in one place; wire up the connectors in a later sprint.
  #
  # Connector types needed (none exist yet):
  #   type: edgar       — SEC EDGAR RSS per-CIK (10-K, 10-Q, 8-K filings)
  #   type: earnings    — earnings call transcript aggregator
  #   type: ir_rss      — company investor-relations news RSS

  - name: "SEC EDGAR — NVIDIA filings"
    type: edgar
    enabled: false
    tier: 1
    signal: primary
    cik: "0001045810"
    forms: ["10-K", "10-Q", "8-K"]
    limit: 10
    # NVIDIA's 10-Ks name TSMC fab nodes, HBM suppliers (Micron/SK Hynix/Samsung),
    # and CoWoS packaging capacity. These are the "slow-moving" entities that
    # anchor the supply chain — exactly the persistence layer the corpus lacks.

  - name: "SEC EDGAR — Intel filings"
    type: edgar
    enabled: false
    tier: 1
    signal: primary
    cik: "0000050863"
    forms: ["10-K", "10-Q", "8-K"]
    limit: 10
    # Intel Foundry roadmap, process node milestones (18A, 14A), customer wins.

  - name: "SEC EDGAR — AMD filings"
    type: edgar
    enabled: false
    tier: 1
    signal: primary
    cik: "0000002488"
    forms: ["10-K", "10-Q", "8-K"]
    limit: 10

  - name: "SEC EDGAR — TSMC filings (20-F)"
    type: edgar
    enabled: false
    tier: 1
    signal: primary
    cik: "0001046179"
    forms: ["20-F", "6-K"]
    limit: 10
    # TSMC is a foreign private issuer — 20-F annual, 6-K interim.
    # Names every customer segment, capacity by node, Arizona fab progress.

  - name: "SEC EDGAR — ASML filings (20-F)"
    type: edgar
    enabled: false
    tier: 1
    signal: primary
    cik: "0000937966"
    forms: ["20-F", "6-K"]
    limit: 10
    # EUV/High-NA tool shipments, customer concentration, China export impact.

  - name: "NVIDIA IR News"
    type: ir_rss
    enabled: false
    tier: 1
    signal: primary
    url: "https://investor.nvidia.com/rss/news-releases.xml"
    limit: 10
    # [VERIFY] URL. Press-release feed — product launches, partnerships,
    # earnings guidance. Higher cadence than 8-K, broader content.

  - name: "Intel IR News"
    type: ir_rss
    enabled: false
    tier: 1
    signal: primary
    url: "https://www.intc.com/rss/news-releases.xml"
    limit: 10
    # [VERIFY] URL.

  - name: "AMD IR News"
    type: ir_rss
    enabled: false
    tier: 1
    signal: primary
    url: "https://ir.amd.com/rss/news-releases.xml"
    limit: 10
    # [VERIFY] URL.

  - name: "Seeking Alpha — Semiconductor Transcripts"
    type: earnings
    enabled: false
    tier: 1
    signal: primary
    tickers: ["NVDA", "INTC", "AMD", "TSM", "ASML", "AVGO", "QCOM", "MU", "AMAT", "LRCX", "KLAC"]
    limit: 15
    # Quarterly transcripts. Highest entity-density documents in the entire
    # stack — one TSMC call names dozens of customers, nodes, and partners.
    # Seeking Alpha transcripts are paywalled but headlines + summaries are
    # free. Full text requires alternative sources (company IR pages host
    # their own transcripts ~1 week after the call).

  # --- Bluesky: Keyword search ---
  # Semiconductor practitioners are active on Bluesky post-Twitter migration.
  # Requires BSKY_HANDLE + BSKY_APP_PASSWORD env vars.

  - name: "Bluesky Semiconductors"
    type: bluesky
    enabled: false  # Enable once BSKY credentials confirmed on VPS
    tier: 2
    signal: community
    limit: 20
    keywords:
      - "TSMC"
      - "process node"
      - "GPU architecture"
      - "chiplet"
      - "HBM"
      - "export controls semiconductors"
    # Practitioner and analyst chatter. Keywords target the technical layer,
    # not consumer GPU discussions.

  # --- Reddit ---
  # r/semiconductors has genuine engineer participation. Requires Reddit
  # credentials (REDDIT_CLIENT_ID + REDDIT_CLIENT_SECRET).

  - name: "Reddit r/semiconductors"
    type: reddit
    enabled: false  # pending credentials
    tier: 2
    signal: community
    subreddit: "semiconductors"
    listing: top
    limit: 15
    # Engineer and analyst community. Top posts surface real technical
    # discussions — yield issues, process node comparisons, ASML news.
    # Better signal quality than general tech subreddits.

  - name: "Reddit r/chipdesign"
    type: reddit
    enabled: false  # pending credentials
    tier: 2
    signal: community
    subreddit: "chipdesign"
    listing: new
    limit: 10
    # Practitioners: RTL designers, layout engineers, verification engineers.
    # Catches EDA toolchain trends and design methodology shifts early.
