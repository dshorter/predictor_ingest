# RSS feeds for Semiconductors & Chips trend graph
# Runtime configuration — parsed by src/ingest/rss.py
#
# Stack design: anchor on deep-analysis newsletters (SemiAnalysis, The Chip Letter)
# for high-signal low-volume Tier 1 content; use trade press and community blogs
# for entity overlap and velocity. Total estimated volume: 15-25 docs/day —
# budget-conscious by design.
#
# NOTE: Feed URLs marked [VERIFY] were not confirmed accessible during config
# authoring. Verify on the VPS before enabling production runs.
#
# tier: 1 = primary/original source, 2 = secondary/analysis, 3 = echo
# signal: primary | commentary | echo | community

feeds:
  # --- Tier 1: Deep analysis (anchor sources — highest signal/doc ratio) ---

  - name: "SemiAnalysis"
    url: "https://semianalysis.substack.com/feed"
    type: rss
    enabled: true
    limit: 10
    tier: 1
    signal: commentary
    # Dylan Patel. Best-in-class analysis on process nodes, supply chain,
    # AI accelerators, and fab economics. Partially paywalled — free tier
    # gets ~50% of posts but those are the public-facing high-signal pieces.
    # [VERIFY] Substack RSS accessibility from VPS.

  - name: "The Chip Letter"
    url: "https://thechipletter.substack.com/feed"
    type: rss
    enabled: true
    limit: 5
    tier: 1
    signal: commentary
    # Stephen Witt. Weekly deep-dives on chip history, architecture, and
    # industry dynamics. Free, low volume (~1/week), very high entity density.
    # Excellent for persistent entity corroboration across issues.
    # [VERIFY] feed accessibility from VPS.

  - name: "Semiconductor Engineering"
    url: "https://semiengineering.com/feed/"
    type: rss
    enabled: true
    limit: 20
    tier: 1
    signal: primary
    # Broad practitioner coverage: EDA, process, packaging, power, security.
    # Community contributor model — multiple expert voices, free, active.
    # Highest volume Tier 1 source; good for catching toolchain and
    # materials trends that trade press misses.
    # [VERIFY] feed accessibility from VPS.

  # --- Tier 1: GPU & microarchitecture (closes the GPU coverage gap) ---

  - name: "Chips and Cheese"
    url: "https://chipsandcheese.com/feed/"
    type: rss
    enabled: true
    limit: 10
    tier: 1
    signal: commentary
    # Deep GPU and CPU microarchitecture teardowns. Free, ~1-2/week.
    # Catches architectural shifts (new cache hierarchies, memory subsystems,
    # compute unit design) well before mainstream trade press notices them.
    # Key source for GPU → AI workload connection in the graph.
    # [VERIFY] feed accessibility from VPS.

  # --- Tier 2: Trade press (entity overlap and velocity) ---

  - name: "EE Times"
    url: "https://www.eetimes.com/feed/"
    type: rss
    enabled: true  # re-enabled 2026-07-19 (audit): retry from pipeline UA
                   # returned 200 with fresh items (was unreachable 04-07..15)
    limit: 15
    tier: 2
    signal: primary
    # Design and tooling coverage. EDA, FPGA, embedded, automotive chips.
    # Fills gaps that deep-analysis newsletters skip. Good on Cadence/Synopsys
    # news and design methodology trends.

  - name: "The Register"
    url: "https://www.theregister.com/headlines.atom"
    type: atom
    enabled: true  # re-enabled 2026-07-19 (audit): the /hardware/semiconductors
                   # section feed 404s; sitewide headlines.atom verified fresh —
                   # keyword-scoped to the chip slice (~3-4/day of ~25).
    limit: 10
    tier: 2
    signal: echo
    # Good on supply chain, geopolitics, and export control news.
    # Different editorial angle from US trade press — catches UK/EU policy
    # angles and ASML/TSMC stories from a non-US perspective.
    include_keywords: ["semiconductor", "chip", "TSMC", "Intel", "AMD",
                       "Nvidia", "GPU", "fab", "foundry", "ASML", "wafer",
                       "export control", "lithography", "HBM", "Arm"]

  - name: "SemiWiki"
    url: "https://semiwiki.com/feed/"
    type: rss
    enabled: true
    limit: 15
    tier: 2
    signal: community
    # Community blog — practitioners, analysts, and industry veterans.
    # Covers EDA tools, IP licensing, fab news, and conference reports.
    # Good overlap source: same fabs/chips covered by Tier 1 but from
    # practitioner angles that surface different relation types.
    # [VERIFY] feed accessibility from VPS.

  # --- Tier 2: GPU/compute from consumer angle (velocity echo) ---

  - name: "Tom's Hardware"
    url: "https://www.tomshardware.com/feeds/all"
    type: rss
    enabled: true
    limit: 8  # raised 3 → 8 on 2026-07-19 with keyword scoping (see below)
    tier: 2
    signal: echo
    # Consumer-facing but high volume on GPU benchmarks, product launches.
    # Primary value: early product announcement velocity and benchmark
    # comparisons that name specific chip variants (H100 SXM5, RX 7900 XTX).
    #
    # LIMIT REDUCED 2026-04-18: 10 → 3. Across the first 10 days of operation
    # Tom's Hardware supplied 80/172 docs (40% of corpus) and 2,047/3,102
    # entities (66% of total). The review-specific entities (variant SKUs,
    # benchmark configs, test rigs) churn per-article and never appear in
    # a second doc, inflating the denominator of the overlap metric while
    # contributing nothing to persistence. See
    # docs/methodology/semiconductor-experiment-10day-findings.md.
    #
    # 2026-07-19 (audit): 98% extraction yield says the docs are usable —
    # the problem was volume/mix, not quality. Keyword-scoped to the
    # industry slice (filters run pre-limit, so the cap now fills with
    # relevant entries) and limit raised 3 → 8.
    include_keywords: ["semiconductor", "TSMC", "Intel", "AMD", "Nvidia",
                       "foundry", "fab", "process node", "wafer", "HBM",
                       "EUV", "lithography", "chiplet", "export", "CHIPS Act",
                       "Samsung", "SK hynix", "Micron", "Qualcomm", "Arm"]

  # Real World Tech: REMOVED 2026-07-19 (audit) — dormant for years, zero
  # docs ever delivered; incumbent and blind inference agreed once the
  # data spoke. See config/source_changelog.yaml.

  # --- Primary-source filings: see "SEC EDGAR Semiconductors" below ---
  # 2026-07-19 (audit): the tier-1 placeholder layer that lived here was
  # dead weight — five per-CIK edgar entries duplicating the CIKs already
  # covered by the enabled generic EDGAR feed (which works: 26 docs), plus
  # ir_rss/earnings stubs whose fetcher types were never built. All
  # removed so the list stops overstating itself; the ingestion-strategy
  # rationale lives in
  # docs/methodology/semiconductor-experiment-10day-findings.md and the
  # removals are logged in config/source_changelog.yaml. If ir_rss or
  # earnings fetchers are ever written, re-add entries then.

  # --- Bluesky: Keyword search ---
  # Semiconductor practitioners are active on Bluesky post-Twitter migration.
  # Requires BSKY_HANDLE + BSKY_APP_PASSWORD env vars.

  - name: "Bluesky Semiconductors"
    type: bluesky
    enabled: true  # Enabled 2026-04-15: phase 2. Falls back to public API if no creds.
    tier: 2
    signal: community
    limit: 20
    keywords:
      - "TSMC"
      - "process node"
      - "GPU architecture"
      - "chiplet"
      - "HBM"
      - "export controls semiconductors"
    # Practitioner and analyst chatter. Keywords target the technical layer,
    # not consumer GPU discussions.

  # --- Reddit: REMOVED 2026-07-19 (audit + operator decision) ---
  # r/semiconductors and r/chipdesign were enabled 2026-04-15 with an
  # unauth-JSON fallback that demonstrably never worked: zero docs ever.
  # Dropped so the list stops overstating chatter coverage; Bluesky is
  # the chatter leg. Re-add via source_changelog.yaml if credentials
  # ever materialize.

  # --- Phase 2: Structured signals (multi-signal fusion) ---
  # Non-RSS sources that provide commercialization, governance, and IP signals.
  # See docs/methodology/deep-research-report.md §Ingestion methods beyond RSS
  # and docs/methodology/research/vetting.txt §8 (CB Insights multi-signal fusion).

  - name: "SEC EDGAR Semiconductors"
    type: edgar
    enabled: true
    tier: 2
    signal: primary
    limit: 20
    companies:
      - {name: "Intel Corporation", cik: "0000050863"}
      - {name: "NVIDIA Corporation", cik: "0001045810"}
      - {name: "Advanced Micro Devices", cik: "0000002488"}
      - {name: "Qualcomm Inc", cik: "0000804328"}
      - {name: "Taiwan Semiconductor (TSMC)", cik: "0001046179"}
      - {name: "Texas Instruments", cik: "0000097476"}
      - {name: "Broadcom Inc", cik: "0001649338"}
    filing_types: ["10-K", "10-Q", "8-K", "20-F", "6-K"]
    # SEC filings: quarterly/annual reports, material events.
    # TSMC files 20-F/6-K as a foreign private issuer.
    # Captures capacity guidance, capex signals, yield commentary,
    # and supply chain commitments not found in news coverage.
    # Rate limit: 10 req/sec. Requires User-Agent with contact email.
    # Env: SEC_EDGAR_EMAIL (required by SEC fair access policy).

  - name: "USPTO Semiconductor Patents"
    type: patents
    enabled: false  # disabled 2026-07-19 (audit): enabled since April yet
                    # zero docs ever delivered — a silent-zero feed. The
                    # fetcher exists (src/ingest/patents.py); diagnose before
                    # re-enabling (backlog SRC-6).
    tier: 2
    signal: primary
    limit: 25
    cpc_codes:
      - "H01L"   # Semiconductor devices; electric solid-state devices
      - "H10B"   # Electronic memory devices (3D NAND, HBM)
      - "H01L21"  # Processes for manufacture of semiconductors
      - "H01L23"  # Semiconductor packaging (CoWoS, chiplet interconnects)
      - "H01L25"  # Assemblies of multiple semiconductor devices (MCM, chiplets)
    keywords:
      - "extreme ultraviolet lithography"
      - "gate all around"
      - "chiplet"
      - "high bandwidth memory"
    assignees:
      - "Taiwan Semiconductor Manufacturing"
      - "Intel Corporation"
      - "Samsung Electronics"
      - "ASML"
      - "NVIDIA"
      - "Advanced Micro Devices"
    # USPTO PatentsView API: process node patents, packaging innovations,
    # EUV lithography IP, chiplet interconnect designs.
    # Captures IP filings 12-18 months before product announcements.
    # Rate limit: 45 req/min. Env: USPTO_API_KEY (optional, higher limits).

  # --- Audit batch 2026-07-19: adopted blind-inference additions ---
  # Three-way source audit (docs/audits/source-audit-2026-07-19.md),
  # operator-approved as written. All feeds verified fresh from the
  # pipeline UA on 2026-07-19. Logged in config/source_changelog.yaml.
  # Fills the two structural gaps: policy/geopolitics (the incumbent had
  # ZERO live policy sources in an export-controls domain) and analyst/
  # data (nothing incumbent).

  - name: "Federal Register Semiconductors"
    url: "https://www.federalregister.gov/api/v1/documents.rss?conditions%5Bterm%5D=semiconductor"
    type: rss
    enabled: true
    limit: 10
    tier: 1
    signal: primary
    # BIS export rules and CHIPS notices as published law — hours-to-days
    # ahead of (and independent of) press interpretation. The single
    # highest-value add of the audit. NOTE: the /documents/search.rss URL
    # bot-challenges; the api/v1 RSS endpoint is the one that works.

  - name: "ChinaTalk"
    url: "https://www.chinatalk.media/feed"
    type: rss
    enabled: true
    tier: 1
    signal: commentary
    # Jordan Schneider. The working policy community's venue for the
    # export-control debate; interviews actual BIS/industry people. ~2-3/wk.

  - name: "TrendForce Semiconductors"
    url: "https://www.trendforce.com/feed/Semiconductors.html"
    type: rss
    enabled: true
    limit: 10
    tier: 1
    signal: primary
    # Taiwan analyst wire: HBM/memory pricing, CoWoS capacity estimates —
    # supply-chain quantification from the supply chain's home turf.
    # Category feed discovered on /presscenter/rss.html.

  - name: "More Than Moore"
    url: "https://morethanmoore.substack.com/feed"
    type: rss
    enabled: true
    tier: 1
    signal: commentary
    # Ian Cutress (ex-AnandTech). Attends IEDM/VLSI/process-technology
    # conferences and reports them properly. ~1-2/wk.

  - name: "The Next Platform"
    url: "https://www.nextplatform.com/feed/"
    type: rss
    enabled: true
    limit: 10
    tier: 1
    signal: commentary
    # Accelerator/datacenter compute economics — the AI-workload-demand
    # leg of the domain's central tension. ~1-2/day.

  - name: "IEEE Spectrum Semiconductors"
    url: "https://spectrum.ieee.org/feeds/topic/semiconductors.rss"
    type: rss
    enabled: true
    tier: 1
    signal: commentary
    # Research bridge: ISSCC/IEDM results as accessible reporting.
    # Topic-scoped feed keeps volume clean. ~3-5/wk.

  - name: "Fabricated Knowledge"
    url: "https://www.fabricatedknowledge.com/feed"
    type: rss
    enabled: true
    tier: 1
    signal: commentary
    # Doug O'Laughlin. Financial-analyst lens on equipment/memory cycles;
    # complements the engineering sources. ~1/wk, partially paywalled.

  - name: "ServeTheHome"
    url: "https://www.servethehome.com/feed/"
    type: rss
    enabled: true
    limit: 10
    tier: 2
    signal: commentary
    # Hands-on accelerator/server hardware at trade shows — catches SKUs
    # and platform details before official launches. ~2-4/day.

  - name: "NVIDIA Blog"
    url: "https://blogs.nvidia.com/feed/"
    type: rss
    enabled: true
    limit: 8
    tier: 1
    signal: primary
    # First-party announcements from the dominant AI-compute vendor.
    # Marketing-heavy — gaming/consumer fluff excluded.
    exclude_keywords: ["GeForce NOW", "game pass", "DLSS in", "gaming laptop"]

  - name: "Bits & Chips"
    url: "https://bits-chips.com/feed/"
    type: rss
    enabled: true
    tier: 2
    signal: primary
    # Dutch/European trade — reports from ASML/imec's backyard with
    # sources US outlets lack. The equipment/litho leg's non-US voice.

  - name: "Semiconductor Digest"
    url: "https://www.semiconductordigest.com/feed/"
    type: rss
    enabled: true
    limit: 10
    tier: 2
    signal: primary
    # Low-prestige manufacturing trade: fab construction, equipment
    # orders, materials news that consumer-tech outlets skip.
