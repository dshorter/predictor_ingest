# --- LLM Leverage Features ---
features:
  llm_disambiguation:
    enabled: true
    similarity_lower_bound: 0.40
    similarity_upper_bound: 0.85
    max_pairs_per_run: 500
    batch_size: 15
    entity_types_to_disambiguate: []  # empty = all types; nano handles this cheaply
    # Key disambiguation challenges in this domain:
    # - ProcessNode: "3nm" vs "N3" vs "N3E" vs "TSMC 3nm" — same node, many names
    # - Chip: "H100" vs "H100 SXM5" vs "H100 PCIe" — variants of same chip
    # - Company: "TSMC" vs "Taiwan Semiconductor" vs "TSM"
    # - Architecture: "Hopper" vs "GH100" vs "NVIDIA Hopper"

  relation_inference:
    enabled: true
    confidence_discount: 0.8
    max_inferences_per_run: 500
    rules_file: "inference_rules.yaml"
    # Supply chain chains are the key inference target:
    # Fab MANUFACTURES Chip + Company DESIGNS Chip → Fab SUPPLIES Company

  cross_document_synthesis:
    enabled: true
    batch_size: 5
    min_shared_entities: 1
    max_batches_per_run: 10
    synthesis_patterns:
      - "corroboration"       # Multiple sources reporting same yield/process news
      - "implicit_relations"  # Supply chain dependencies implied across articles
      - "event_clustering"    # Earnings + analyst reports + trade press on same announcement

  trend_narratives:
    enabled: true
    top_n: 10
    max_tokens_per_narrative: 200
    style: "technical"  # Analyst tone, not trade press

# --- Prompts ---
prompts:
  dir: prompts
  system_prompt: system.txt
  user_prompt: user.txt
  single_message_prompt: single_message.txt
