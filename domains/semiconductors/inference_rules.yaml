# Inference rules for Semiconductors & Chips domain
# Applied by the relation_inference pipeline stage.
# confidence_discount multiplies the base confidence of the source relations.

rules:

  # If a Fab MANUFACTURES a Chip AND a Company DESIGNS that Chip,
  # infer the Fab SUPPLIES the Company.
  # e.g., TSMC manufactures H100 + NVIDIA designs H100 → TSMC supplies NVIDIA
  - name: fab_supplies_designer
    pattern:
      - { subject: "?fab", rel: MANUFACTURES, object: "?chip" }
      - { subject: "?company", rel: DESIGNS, object: "?chip" }
    infer:
      subject: "?fab"
      rel: SUPPLIES
      object: "?company"
      kind: inferred
    confidence_discount: 0.80

  # If a Chip USES_PROCESS a ProcessNode AND a Fab FABRICATES that ProcessNode,
  # infer the Fab MANUFACTURES the Chip.
  # e.g., H100 uses N4 + TSMC fabricates N4 → TSMC manufactures H100
  - name: fab_manufactures_via_process
    pattern:
      - { subject: "?chip", rel: USES_PROCESS, object: "?node" }
      - { subject: "?fab", rel: FABRICATES, object: "?node" }
    infer:
      subject: "?fab"
      rel: MANUFACTURES
      object: "?chip"
      kind: inferred
    confidence_discount: 0.75

  # If Company A SUPPLIES Company B AND Company B SUPPLIES Company C,
  # infer Company A DEPENDS_ON Company C (transitive supply chain dependency).
  # e.g., ASML supplies TSMC + TSMC supplies NVIDIA → NVIDIA depends on ASML
  - name: supply_chain_dependency
    pattern:
      - { subject: "?company_b", rel: SUPPLIES, object: "?company_c" }
      - { subject: "?company_a", rel: SUPPLIES, object: "?company_b" }
    infer:
      subject: "?company_c"
      rel: DEPENDS_ON
      object: "?company_a"
      kind: inferred
    confidence_discount: 0.65  # lower — 2-hop inference
