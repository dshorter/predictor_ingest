# Inference rules for Semiconductors & Chips domain
# Applied by the relation_inference pipeline stage (src/infer/__init__.py).
#
# Schema: each rule must use antecedents[]/consequent format.
# The engine supports LINEAR chains only (antecedent[0].target == antecedent[1].source).
# Diamond patterns (two antecedents sharing a common target) are not supported in V1.
#
# Valid entity types: Company, Fab, Chip, Architecture, ProcessNode, Tool,
#                     Topic, Person, Benchmark, Dataset, Tech, Regulation

inference_rules:

  # If Company A SUPPLIES Company B AND Company B SUPPLIES Company C,
  # infer Company C DEPENDS_ON Company A (transitive supply chain).
  # e.g., ASML SUPPLIES TSMC + TSMC SUPPLIES NVIDIA → NVIDIA DEPENDS_ON ASML
  - name: supply_chain_dependency
    description: >
      Transitive supply chain: if A supplies B and B supplies C,
      infer C depends on A (2-hop upstream dependency).
    antecedents:
      - source_type: Company
        rel: SUPPLIES
        target_type: Company
      - source_type: Company
        rel: SUPPLIES
        target_type: Company
    consequent:
      rel: DEPENDS_ON
      source: "antecedent[1].target"   # C — the downstream company
      target: "antecedent[0].source"   # A — the upstream supplier
    confidence_discount: 0.65

  # NOTE: The following rules are diamond patterns (both antecedents share a
  # common *target*) which the V1 engine cannot express. Leaving as comments
  # until the engine supports non-chain joins.
  #
  # fab_supplies_designer:
  #   Fab MANUFACTURES Chip + Company DESIGNS Chip → Fab SUPPLIES Company
  #   (both antecedents point TO Chip — diamond, not chain)
  #
  # fab_manufactures_via_process:
  #   Chip USES_PROCESS Node + Fab FABRICATES Node → Fab MANUFACTURES Chip
  #   (both antecedents point TO Node — diamond, not chain)
